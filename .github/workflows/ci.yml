name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  java-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [inventory-service, pricing-service, websocket-gateway, api-gateway, analytics-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Run tests - ${{ matrix.service }}
        run: cd ${{ matrix.service }} && mvn test -B

  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [recommendation-service, forecasting-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: cd ${{ matrix.service }} && pip install -r requirements.txt
      - name: Run tests - ${{ matrix.service }}
        run: cd ${{ matrix.service }} && python -m pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python services
        run: |
          flake8 recommendation-service/ --max-line-length=120 --exclude=__pycache__
          flake8 forecasting-service/ --max-line-length=120 --exclude=__pycache__

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [inventory-service, recommendation-service, forecasting-service, pricing-service, websocket-gateway, api-gateway, analytics-service]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image - ${{ matrix.service }}
        run: docker build -t ${{ matrix.service }}:test ./${{ matrix.service }}

  docker-push:
    needs: [java-test, python-test, lint, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [inventory-service, recommendation-service, forecasting-service, pricing-service, websocket-gateway, api-gateway, analytics-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push - ${{ matrix.service }}
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest ./${{ matrix.service }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest
